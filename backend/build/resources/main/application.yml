server:
  port: 8080

spring:
  application:
    name: saju-recommender
  threads:
    virtual:
      enabled: true

app:
  gemini:
    api-key: ${GEMINI_API_KEY:none}
    model: gemini-2.0-flash
  weather:
    api-key: ${OPENWEATHER_API_KEY:mock}
    base-url: https://api.openweathermap.org/data/2.5
  cors:
    allowed-origins: http://localhost:3000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
